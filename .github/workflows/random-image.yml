name: Random Image Picker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  pick-random-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Pick random webp and overwrite docs/Image.webp
        run: |
          mapfile -t all_files < <(find images -maxdepth 1 -name "*.webp" -type f | sort)
          if [ ${#all_files[@]} -eq 0 ]; then
            echo "No webp files found in images/"
            exit 1
          fi

          current_hash=""
          if [ -f docs/Image.webp ]; then
            current_hash=$(md5sum docs/Image.webp | cut -d' ' -f1)
          fi

          mapfile -t candidates < <(
            for f in "${all_files[@]}"; do
              h=$(md5sum "$f" | cut -d' ' -f1)
              [ "$h" != "$current_hash" ] && echo "$f"
            done
          )
          if [ ${#candidates[@]} -eq 0 ]; then
            candidates=("${all_files[@]}")
          fi

          selected=$(printf '%s\n' "${candidates[@]}" | shuf -n 1)
          echo "Current hash: ${current_hash:-none}"
          echo "Selected: $(basename "$selected")"
          cp "$selected" docs/Image.webp

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/Image.webp
          git diff --cached --quiet && echo "No change" && exit 0
          last_msg=$(git log -1 --pretty=%s)
          if [ "$last_msg" = "chore: update Image.webp [skip ci]" ]; then
            if git diff --cached HEAD^ --quiet; then
              echo "Image matches pre-update state; resetting last commit"
              git reset HEAD^
              git push --force-with-lease
            else
              git commit --amend --no-edit
              git push --force-with-lease
            fi
          else
            git commit -m "chore: update Image.webp [skip ci]"
            git push
          fi
